3836"/><rect x="88" y="153" width="8" height="17" fill="#3c3836"/><rect x="96" y="153" width="8" height="17" fill="#3c3836"/><rect x="104" y="153" width="8" height="17" fill="#3c3836"/><rect x="112" y="153" width="8" height="17" fill="#3c3836"/><rect x="120" y="153" width="8" height="17" fill="#3c3836"/><rect x="640" y="204" width="8" height="17" fill="#3c3836"/><rect x="648" y="204" width="8" height="17" fill="#3c3836"/><rect x="656" y="204" width="8" height="17" fill="#3c3836"/><rect x="664" y="204" width="8" height="17" fill="#3c3836"/><text x="0" y="11" xml:space="preserve"><tspan x="0" fill="#d3869b" font-weight="bold"> claux </tspan><tspan x="56" fill="#928374">v20260422.0.0</tspan><tspan x="160" fill="#d0d0d0">                                                                                </tspan></text><text x="0" y="28" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="45" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#83a598">● </tspan><tspan x="24" fill="#d3869b" font-weight="bold">claude-sonnet-4-20250514 </tspan><tspan x="224" fill="#d0d0d0">                                                                       </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="62" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#d5c4a1">This is the entry point for </tspan><tspan x="248" fill="#d5c4a1" font-weight="bold">claux</tspan><tspan x="288" fill="#d5c4a1">. It parses CLI arguments via </tspan><tspan x="528" fill="#8ec07c">clap</tspan><tspan x="560" fill="#d5c4a1">, loads configuration from </tspan><tspan x="776" fill="#8ec07c">~/</tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="79" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="96" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#d5c4a1">Key things:</tspan><tspan x="112" fill="#d0d0d0">                                                                                     </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="113" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="130" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#928374">• </tspan><tspan x="40" fill="#8ec07c">--tui</tspan><tspan x="80" fill="#d5c4a1"> launches the full-screen Ratatui interface</tspan><tspan x="424" fill="#d0d0d0">                                              </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="147" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#928374">• </tspan><tspan x="40" fill="#8ec07c">--resume &lt;id&gt;</tspan><tspan x="144" fill="#d5c4a1"> reloads a previous session</tspan><tspan x="360" fill="#d0d0d0">                                                      </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="164" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#928374">• </tspan><tspan x="40" fill="#8ec07c">-p &lt;prompt&gt;</tspan><tspan x="128" fill="#d5c4a1"> runs a single query and exits</tspan><tspan x="368" fill="#d0d0d0">                                                     </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="181" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="198" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#b8bb26">● </tspan><tspan x="24" fill="#b8bb26" font-weight="bold">claude-sonnet-4-20250514 </tspan><tspan x="224" fill="#d0d0d0">                                                                       </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="215" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#b8bb26">Sure, let me look at the configuration handling next. The config module uses </tspan><tspan x="640" fill="#8ec07c">toml</tspan><tspan x="672" fill="#b8bb26"> for parsing an</tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="232" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#b8bb26">  ▊</tspan><tspan x="32" fill="#d0d0d0">                                                                                               </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="249" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="266" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="283" xml:space="preserve"><tspan x="0" fill="#928374">┌ &gt; ───────────────────────────────────────────────────────────────────────────────────────────────┐</tspan></text><text 
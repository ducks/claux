                                </tspan></text><text x="0" y="28" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#8ec07c">~/.config/claux/config.toml</tspan><tspan x="224" fill="#d5c4a1">, and dispatches to either the REPL or one-shot mode depending on the</tspan><tspan x="776" fill="#d0d0d0">  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="45" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d5c4a1">flags.</tspan><tspan x="56" fill="#d0d0d0">                                                                                            </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="62" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="79" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="96" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#d5c4a1">Key things:</tspan><tspan x="112" fill="#d0d0d0">                                                                                     </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="113" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="130" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="147" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#928374">• </tspan><tspan x="40" fill="#8ec07c">--tui</tspan><tspan x="80" fill="#d5c4a1"> launches the full-screen Ratatui interface</tspan><tspan x="424" fill="#d0d0d0">                                              </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="164" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#928374">• </tspan><tspan x="40" fill="#8ec07c">--resume &lt;id&gt;</tspan><tspan x="144" fill="#d5c4a1"> reloads a previous session</tspan><tspan x="360" fill="#d0d0d0">                                                      </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="181" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#928374">• </tspan><tspan x="40" fill="#8ec07c">-p &lt;prompt&gt;</tspan><tspan x="128" fill="#d5c4a1"> runs a single query and exits</tspan><tspan x="368" fill="#d0d0d0">                                                     </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="198" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">                                                                                                  </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="215" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#b8bb26">● </tspan><tspan x="24" fill="#b8bb26" font-weight="bold">claude-sonnet-4-20250514 </tspan><tspan x="224" fill="#d0d0d0">                                                                       </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="232" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d0d0d0">  </tspan><tspan x="24" fill="#b8bb26">Sure, let me look at the configuration handling next. The config module uses </tspan><tspan x="640" fill="#8ec07c">toml</tspan><tspan x="672" fill="#b8bb26"> for parsing</tspan><tspan x="768" fill="#d0d0d0">   </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="249" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#b8bb26">and supports both global and per-project overrides</tspan><tspan x="408" fill="#d0d0d0">                                                </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="266" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#b8bb26">  ▊</tspan><tspan x="32" fill="#d0d0d0">                                                                                               </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="283" xml:space="preserve"><tspan x="0" fill="#928374">┌ &gt; ───────────────────────────────────────────────────────────────────────────────────────────────┐</tspan></text><text x="0" y="300" xml:space="preserve"><tspan x="0" fill="#928374">│</tspan><tspan x="8" fill="#d5c4a1">... (type to steer, Enter to queue, Ctrl+C to interrupt)                                          </tspan><tspan x="792" fill="#928374">│</tspan></text><text x="0" y="317" xml:space="preserve"><tspan x="0" fill="#928374">└──────────────────────────────────────────────────────────────────────────────────────────────────┘</tspan></text><text x="0" y="334" xml:space="preserve"><tspan x="0" fill="#b8bb26"> </tspan><tspan x="8" fill="#928374"> 1.2k tokens </tspan><tspan x="112" fill="#d0d0d0">                                                                                      </tspan></text></svg>
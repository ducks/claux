name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: claux
            asset_name: claux-linux-x86_64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary_name: claux
            asset_name: claux-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: claux
            asset_name: claux-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: claux.exe
            asset_name: claux-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux and macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/${{ matrix.binary_name }}

      - name: Rename binary for upload
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary_name }} ${{ matrix.asset_name }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
